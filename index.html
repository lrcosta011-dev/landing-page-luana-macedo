<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio - Luana Macedo</title>
  
  <!-- React, ReactDOM, Babel e Tailwind CSS via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700&display=swap');
    
    html { scroll-behavior: auto; }
    body { 
      font-family: 'Montserrat', sans-serif; 
      background-color: #F4F4F4; 
      color: #111111; 
      margin: 0; 
      overflow-x: hidden; 
      -webkit-font-smoothing: antialiased;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    .view-wrapper {
      will-change: transform;
    }

    /* Animações de Slide via Hardware (GPU) */
    @keyframes slideInRight {
      from { transform: translate3d(100vw, 0, 0); }
      to { transform: translate3d(0, 0, 0); }
    }
    @keyframes slideInLeft {
      from { transform: translate3d(-100vw, 0, 0); }
      to { transform: translate3d(0, 0, 0); }
    }
    @keyframes slideOutLeft {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-100vw, 0, 0); }
    }
    @keyframes slideOutRight {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(100vw, 0, 0); }
    }

    .animate-slide-in-right { animation: slideInRight 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .animate-slide-in-left { animation: slideInLeft 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .animate-slide-out-left { animation: slideOutLeft 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .animate-slide-out-right { animation: slideOutRight 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

    /* Crossfade animation for hero slideshow */
    .fade-enter { opacity: 0; }
    .fade-enter-active { opacity: 1; transition: opacity 1.5s ease-in-out; }
    .fade-exit { opacity: 1; }
    .fade-exit-active { opacity: 0; transition: opacity 1.5s ease-in-out; }

  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // Ícones recriados em SVG para uso direto no navegador sem precisar instalar o pacote lucide-react
    const X = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    );
    const ChevronLeft = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    );
    const ChevronRight = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
    );
    const Menu = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>
    );

    // Mapeamento local usando encodeURI para lidar com espaços e acentos no caminho do arquivo local
    const mapLocal = (path) => encodeURI(path);

    // Dados reais dos projetos com caminhos locais
    const projectsData = [
      {
        id: "auditorio-dois-candangos",
        name: "Auditório Dois Candangos",
        category: "Comercial",
        date: "2022",
        location: "Campus Darcy Ribeiro - UnB",
        summary: "Projeto de reforma para o Auditório Dois Candangos, localizado no Campus Darcy Ribeiro - UnB. A demanda buscava o restauro de um auditório ícone da universidade que estava desativado por falta de infraestrutura. Foram utilizadas novas técnicas de obra para uma identidade visual moderna mas ainda assim, valorizando o clássico.",
        thumb: mapLocal("./imagens/Auditorio Dois Candangos/Comercial Auditório Dois Candangos (1).png"),
        images: Array.from({length: 11}, (_, i) => mapLocal(`./imagens/Auditorio Dois Candangos/Comercial Auditório Dois Candangos (${i+1}).png`))
      },
      {
        id: "residencia-de",
        name: "Residência D.E",
        category: "Residencial",
        date: "2024",
        location: "Brasília, DF",
        status: "Concluído",
        summary: "O presente portfólio contém apenas algumas páginas do material desenvolvido para o Executivo Arquitetônico. Este memorial descritivo sintetiza o projeto executivo de uma residência com 283,21 m² de área construída em um lote de 867,64 m², detalhando minuciosamente dois pavimentos que integram áreas sociais no térreo a uma zona íntima no pavimento superior.",
        thumb: mapLocal("./imagens/residencial D.E 1/Portfólio Residencial 1 - Luana Macedo - (1).png"),
        images: Array.from({length: 19}, (_, i) => mapLocal(`./imagens/residencial D.E 1/Portfólio Residencial 1 - Luana Macedo - (${i+1}).png`))
      },
      {
        id: "vestiario-mesp",
        name: "Vestiário MESP",
        category: "Comercial",
        date: "2023",
        location: "Campus FCTE UnB Gama",
        summary: "Projeto de extensão de quadra esportiva, localizado no Campus FCTE UnB Gama. O objetivo era atender à alta demanda de vestiários femininos e masculinos em uma região distante dos sanitários existentes.",
        thumb: mapLocal("./imagens/Vestiário MESP/comercial -Vestiário MESP (1).png"),
        images: Array.from({length: 8}, (_, i) => mapLocal(`./imagens/Vestiário MESP/comercial -Vestiário MESP (${i+1}).png`))
      },
      {
        id: "espaco-maker",
        name: "Espaço Maker",
        category: "Comercial",
        date: "2023",
        location: "ICC Sul - UnB",
        summary: "Projeto de reforma do Laboratório de Física, localizado no ICC Sul, para a demanda de criação de sala de aula integrada com os espaços práticos, com auxílio de novos pontos hidráulicos e elétricos.",
        thumb: mapLocal("./imagens/Espaço Maker/Comercial Espaço Maker (1).png"),
        images: Array.from({length: 6}, (_, i) => mapLocal(`./imagens/Espaço Maker/Comercial Espaço Maker (${i+1}).png`))
      }
    ];

    const viewOrder = ['home', 'projects', 'about', 'contact'];

    const Lightbox = ({ images, initialIndex, onClose }) => {
      const [currentIndex, setCurrentIndex] = useState(initialIndex);
      const [isZoomed, setIsZoomed] = useState(false);
      const [pan, setPan] = useState({ x: 0, y: 0 });
      const [isDragging, setIsDragging] = useState(false);
      const dragStart = useRef({ x: 0, y: 0 });
      const dragMoved = useRef(false);
      
      const handlePrev = useCallback(() => { setCurrentIndex((p) => (p === 0 ? images.length - 1 : p - 1)); setIsZoomed(false); setPan({x:0, y:0}); }, [images.length]);
      const handleNext = useCallback(() => { setCurrentIndex((p) => (p === images.length - 1 ? 0 : p + 1)); setIsZoomed(false); setPan({x:0, y:0}); }, [images.length]);

      useEffect(() => {
        const handleKey = (e) => {
          if (e.key === "Escape") onClose();
          if (e.key === "ArrowLeft") handlePrev();
          if (e.key === "ArrowRight") handleNext();
        };
        window.addEventListener("keydown", handleKey);
        return () => window.removeEventListener("keydown", handleKey);
      }, [handlePrev, handleNext, onClose]);

      const toggleZoom = (e) => {
        if (e) e.stopPropagation();
        if (isZoomed) {
          setIsZoomed(false);
          setPan({x: 0, y: 0});
        } else {
          setIsZoomed(true);
        }
      };

      const handlePointerDown = (e) => {
        if (!isZoomed) return;
        setIsDragging(true);
        dragMoved.current = false;
        dragStart.current = { x: e.clientX - pan.x, y: e.clientY - pan.y };
        e.target.setPointerCapture(e.pointerId);
      };

      const handlePointerMove = (e) => {
        if (!isDragging || !isZoomed) return;
        const newX = e.clientX - dragStart.current.x;
        const newY = e.clientY - dragStart.current.y;
        if (Math.abs(newX - pan.x) > 3 || Math.abs(newY - pan.y) > 3) {
          dragMoved.current = true;
        }
        setPan({ x: newX, y: newY });
      };

      const handlePointerUp = (e) => {
        if (!isZoomed) return;
        setIsDragging(false);
        e.target.releasePointerCapture(e.pointerId);
      };

      useEffect(() => {
        const originalOverflow = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        return () => { document.body.style.overflow = originalOverflow; };
      }, []);

      return (
        <div className="fixed inset-0 z-[100] bg-[#111111]/95 backdrop-blur-md flex items-center justify-center p-4 sm:p-8 transition-opacity" onClick={onClose}>
          <button onClick={(e) => { e.stopPropagation(); onClose(); }} className="absolute top-6 right-6 text-white/70 hover:text-white transition-colors z-[110]">
            <X size={32} />
          </button>
          <button onClick={(e) => { e.stopPropagation(); handlePrev(); }} className="absolute left-6 text-white/70 hover:text-white transition-colors z-[110]">
            <ChevronLeft size={48} />
          </button>
          <div className="relative w-full h-full flex items-center justify-center pointer-events-none overflow-hidden">
            <img 
              src={images[currentIndex]} 
              alt={`Galeria ${currentIndex + 1}`} 
              className={`pointer-events-auto max-w-full max-h-full object-contain transition-transform ${isZoomed && !isDragging ? 'duration-300' : 'duration-0'} ${isZoomed ? (isDragging ? 'cursor-grabbing' : 'cursor-grab') : 'cursor-zoom-in'}`} 
              style={{
                transform: isZoomed ? `translate(${pan.x}px, ${pan.y}px) scale(2.5)` : 'translate(0px, 0px) scale(1)',
                touchAction: 'none'
              }}
              onClick={(e) => { 
                e.stopPropagation();
                if (!isZoomed) {
                  toggleZoom(e); 
                } else if (!dragMoved.current) {
                  toggleZoom(e);
                }
              }}
              onPointerDown={handlePointerDown}
              onPointerMove={handlePointerMove}
              onPointerUp={handlePointerUp}
              onPointerCancel={handlePointerUp}
              draggable="false"
            />
          </div>
          <button onClick={(e) => { e.stopPropagation(); handleNext(); }} className="absolute right-6 text-white/70 hover:text-white transition-colors z-[110]">
            <ChevronRight size={48} />
          </button>
        </div>
      );
    };

    const ProjectDetails = ({ project, onBack, onOpenLightbox }) => {
      return (
        <div className="w-full max-w-[1400px] mx-auto pt-[140px] px-6 pb-32">
          <button 
            onClick={onBack}
            className="mb-12 text-[10px] tracking-[0.2em] uppercase hover:opacity-50 transition-opacity flex items-center gap-2 font-medium text-black"
          >
            ← Projetos
          </button>

          <div className="flex flex-col lg:flex-row gap-16 lg:gap-24 mb-24 items-start">
            <div className="w-full lg:w-3/5 cursor-pointer" onClick={() => onOpenLightbox(project.images, 0)}>
              <img src={project.images[0]} alt={project.name} className="w-full h-auto object-cover" />
            </div>
            <div className="w-full lg:w-2/5 flex flex-col pt-0 lg:pt-8 sticky top-32">
              <h1 className="text-4xl md:text-5xl font-light mb-8 tracking-tight text-black">{project.name}</h1>
              <div className="flex flex-col gap-4 mb-10 text-[10px] uppercase tracking-[0.2em] text-gray-500">
                <div className="border-b border-gray-100 pb-2">Categoria: <span className="text-black font-medium">{project.category}</span></div>
                <div className="border-b border-gray-100 pb-2">Ano: <span className="text-black font-medium">{project.date}</span></div>
                <div className="border-b border-gray-100 pb-2">Local: <span className="text-black font-medium">{project.location}</span></div>
              </div>
              <p className="text-sm leading-relaxed font-light text-justify text-gray-700">
                {project.summary}
              </p>
            </div>
          </div>
          
          <div className="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
            {project.images.slice(1).map((img, i) => (
              <div 
                key={i} 
                className="aspect-square cursor-pointer overflow-hidden bg-gray-50 transition-all group" 
                onClick={() => onOpenLightbox(project.images, i + 1)}
              >
                <img 
                  src={img} 
                  loading="lazy" 
                  className="w-full h-full object-cover opacity-90 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700" 
                />
              </div>
            ))}
          </div>
        </div>
      );
    };

    function App() {
      const [currentView, setCurrentView] = useState('home');
      const [activeProject, setActiveProject] = useState(null);
      const [activeFilter, setActiveFilter] = useState('Todos');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [globalLightbox, setGlobalLightbox] = useState(null);
      
      const [prevView, setPrevView] = useState(null);
      const [prevProject, setPrevProject] = useState(null);
      const [prevScrollY, setPrevScrollY] = useState(0);
      const [slideDirection, setSlideDirection] = useState('right');
      const [isTransitioning, setIsTransitioning] = useState(false);
      const timeoutRef = useRef(null);

      // Hero Slideshow Logic
      const heroImages = [
        mapLocal("./assets/Catedral de Brasilia.jpg"),
        mapLocal("./assets/As curvas da arquitetura de BSB.jpg"),
        mapLocal("./assets/Gemini_Generated_Image_gn9j1dgn9j1dgn9j.png"),
        mapLocal("./assets/Gemini_Generated_Image_t8hggvt8hggvt8hg.png"),
        mapLocal("./assets/pexels-bangalo-31713603.jpg")
      ];
      const [heroIndex, setHeroIndex] = useState(0);

      useEffect(() => {
        if (currentView !== 'home') return;
        const interval = setInterval(() => {
          setHeroIndex(prev => (prev + 1) % heroImages.length);
        }, 5000);
        return () => clearInterval(interval);
      }, [currentView, heroImages.length]);

      const filteredProjects = useMemo(() => {
        return projectsData.filter(p => 
          activeFilter === 'Todos' || 
          (activeFilter === 'Residenciais' && p.category === 'Residencial') || 
          (activeFilter === 'Comerciais' && p.category === 'Comercial')
        );
      }, [activeFilter]);

      const triggerTransition = useCallback((newView, dir, newActiveProject = null) => {
        if (isTransitioning) return; 
        setIsTransitioning(true);
        
        if (timeoutRef.current) clearTimeout(timeoutRef.current);
        
        setPrevScrollY(window.scrollY);
        setSlideDirection(dir);
        setPrevProject(activeProject);
        setActiveProject(newActiveProject);
        setPrevView(currentView);
        setCurrentView(newView);
        setIsMobileMenuOpen(false);

        requestAnimationFrame(() => {
          window.scrollTo(0, 0);
        });

        timeoutRef.current = setTimeout(() => {
          setPrevView(null);
          setIsTransitioning(false);
          timeoutRef.current = null;
        }, 600); // Sincronizado com CSS
      }, [currentView, activeProject, isTransitioning]);

      const navigateTo = useCallback((view) => {
        if (view === currentView || isTransitioning) {
          setIsMobileMenuOpen(false);
          return;
        }

        let currentIndex = viewOrder.indexOf(currentView);
        if (currentView === 'project') currentIndex = viewOrder.indexOf('projects') + 0.1;

        let newIndex = viewOrder.indexOf(view);
        if (view === 'project') newIndex = viewOrder.indexOf('projects') + 0.1;

        const dir = newIndex > currentIndex ? 'right' : 'left';
        triggerTransition(view, dir, null);
      }, [currentView, isTransitioning, triggerTransition]);

      const openProject = useCallback((project) => {
        triggerTransition('project', 'right', project);
      }, [triggerTransition]);

      useEffect(() => {
        if (isMobileMenuOpen) document.body.style.overflow = 'hidden';
        else document.body.style.overflow = '';
      }, [isMobileMenuOpen]);

      const navItemStyle = (view) => {
        const isActive = (currentView === view || (view === 'projects' && currentView === 'project'));
        return `text-[10px] sm:text-[11px] tracking-[0.15em] uppercase px-5 py-2 rounded-full transition-all duration-300 whitespace-nowrap ${isActive ? 'bg-[#111111] text-white font-medium' : 'text-gray-600 hover:text-black hover:bg-gray-50 font-light'}`;
      };

      const renderViewContent = (viewName, isOldView = false) => {
        switch (viewName) {
          case 'home':
            return (
              <section className="relative h-[100dvh] w-full flex flex-col items-center justify-center overflow-hidden bg-white">
                {heroImages.map((img, index) => (
                  <img 
                    key={index}
                    src={img} 
                    alt={`Inspiração ${index + 1}`} 
                    className={`absolute inset-0 w-full h-full object-cover transition-opacity duration-[2000ms] ease-in-out ${index === heroIndex ? 'opacity-100' : 'opacity-0'}`} 
                  />
                ))}
                <div className="absolute inset-0 bg-black/30"></div>
                
                <div className="relative z-10 text-center text-white px-6 mt-12">
                  <h1 className="text-4xl sm:text-6xl md:text-8xl font-light tracking-[0.1em] uppercase mb-6 drop-shadow-lg">Luana Macedo</h1>
                  <p className="text-[10px] sm:text-xs tracking-[0.3em] uppercase font-light drop-shadow-md">
                    Arquitetura e Projetos Executivos
                  </p>
                </div>
              </section>
            );

          case 'projects':
            const filters = ['Todos', 'Residenciais', 'Comerciais'];
            return (
              <section className="w-full bg-[#F4F4F4] min-h-screen pt-[160px] pb-32 flex flex-col">
                <div className="max-w-[1400px] w-full mx-auto px-6">
                  <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-16 border-b border-gray-200 pb-6">
                    <h2 className="text-2xl font-light tracking-tight text-black mb-4 sm:mb-0">Projetos Selecionados</h2>
                    <div className="flex flex-wrap gap-4 items-center">
                      {filters.map((f, index) => (
                        <React.Fragment key={f}>
                          <button 
                            onClick={() => !isOldView && !isTransitioning && setActiveFilter(f)} 
                            className={`text-xs uppercase tracking-[0.15em] transition-colors ${activeFilter === f ? 'text-black font-medium' : 'text-gray-500 hover:text-black'}`}
                          >
                            {f}
                          </button>
                          {index < filters.length - 1 && <span className="text-gray-300">|</span>}
                        </React.Fragment>
                      ))}
                    </div>
                  </div>
                  
                  {/* Grid Minimalista Inspirado na Referência (Sem Espaçamento) */}
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-1">
                    {filteredProjects.map(p => (
                      <div key={p.id} className="group cursor-pointer flex flex-col relative overflow-hidden" onClick={() => !isOldView && !isTransitioning && openProject(p)}>
                        <div className="relative aspect-square bg-gray-100 overflow-hidden">
                          <img src={p.thumb} alt={p.name} loading="lazy" className="w-full h-full object-cover transition-all duration-700 group-hover:scale-105 group-hover:grayscale" />
                          <div className="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition-all duration-500 flex flex-col items-center justify-center p-6 text-center">
                            <h3 className="text-xl md:text-2xl font-light text-white opacity-0 translate-y-4 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-500">{p.name}</h3>
                            <div className="w-8 h-px bg-white/50 my-3 opacity-0 group-hover:opacity-100 transition-all duration-500 delay-75"></div>
                            <span className="text-[10px] uppercase tracking-widest text-white/80 opacity-0 translate-y-4 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-500 delay-100">{p.category} — {p.date}</span>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </section>
            );

          case 'project':
            const p = isOldView ? prevProject : activeProject;
            if (!p) return null;
            return <ProjectDetails project={p} onBack={() => !isOldView && !isTransitioning && navigateTo('projects')} onOpenLightbox={(images, index) => setGlobalLightbox({ images, initialIndex: index })} />;

          case 'about':
            return (
              <div className="max-w-[1400px] mx-auto px-6 py-24 pt-[120px] flex flex-col md:flex-row gap-16 lg:gap-24 items-start min-h-screen">
                 <div className="w-full md:w-1/2 sticky top-28 pt-8 flex items-start justify-center bg-transparent">
                    <img src={mapLocal("./imagens/foto de perfil/foto perfil.jpg")} alt="Luana Macedo" className="w-full max-h-[85vh] object-contain object-top grayscale" />
                 </div>
                 <div className="w-full md:w-1/2 flex flex-col pt-8">
                    <h1 className="text-3xl sm:text-4xl font-light tracking-tight mb-8">O rigor técnico por trás da arquitetura.</h1>
                    <div className="w-12 h-px bg-black mb-8"></div>
                    <p className="text-sm leading-[1.8] font-light text-justify mb-16 text-gray-700">
                      Sou uma estudante de Arquitetura e Urbanismo, com previsão de formatura para 2026/2, que busca atuar na área de projetos executivos de arquitetura, contribuindo com as equipes na manutenção da qualidade de projetos e atendimento aos prazos, com interesse especial em edificações. Possuo CNH B, veículo próprio e computador próprio.
                    </p>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-12 gap-y-12">
                      <div>
                        <h3 className="text-[10px] uppercase tracking-[0.2em] text-gray-400 mb-4 font-medium">Ferramentas</h3>
                        <ul className="text-sm font-light space-y-2 text-gray-800"><li>SketchUp avançado</li><li>V-Ray Render</li><li>Render IA</li><li>Revit BIM</li><li>AutoCAD</li><li>Photoshop</li></ul>
                      </div>
                      <div>
                        <h3 className="text-[10px] uppercase tracking-[0.2em] text-gray-400 mb-4 font-medium">Atuação</h3>
                        <ul className="text-sm font-light space-y-2 text-gray-800"><li>Projeto executivo</li><li>Interiores</li><li>Orçamento</li><li>Acompanhamento de obra</li></ul>
                      </div>
                      <div className="sm:col-span-2">
                        <h3 className="text-[10px] uppercase tracking-[0.2em] text-gray-400 mb-4 font-medium">Formação</h3>
                        <ul className="text-sm font-light space-y-3 text-gray-800">
                          <li>Bacharelado em Arquitetura e Urbanismo</li>
                          <li><span className="text-gray-400 text-xs">FAU — UnB · 2020 – 2026</span></li>
                        </ul>
                      </div>
                      <div className="sm:col-span-2">
                        <h3 className="text-[10px] uppercase tracking-[0.2em] text-gray-400 mb-4 font-medium">Experiências</h3>
                        <ul className="text-sm font-light space-y-3 text-gray-800">
                          <li><span className="text-gray-400 text-xs w-24 inline-block">2025 – 2026</span> Centro de Planejamento Oscar Niemeyer</li>
                          <li><span className="text-gray-400 text-xs w-24 inline-block">2025</span> Controladoria Geral da União</li>
